name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Cypress binary
        run: npx cypress install --force

      - name: Verify Cypress
        run: npx cypress verify

      - name: Ensure Cypress CLI is executable
        run: |
          chmod +x ./node_modules/.bin/cypress
          chmod +x ./node_modules/cypress/bin/cypress

      - name: Run Cypress tests
        run: ./node_modules/.bin/cypress run --headless --browser electron
